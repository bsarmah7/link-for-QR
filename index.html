<!DOCTYPE html>
<html>
<head>
    <title>Link Generator</title>
</head>

<body>

<h2>Generate Link</h2>

<textarea id="text" rows="6" cols="30" placeholder="Enter text"></textarea>
<br><br>

<button onclick="generateLink()">Generate Link</button>

<br><br>

<input type="text" id="link" size="50" readonly>
<br><br>

<button onclick="copyLink()">Copy Link</button>

<script>
function generateLink() {
    let data = document.getElementById("text").value.trim();

    if (!data) {
        alert("Enter text");
        return;
    }

    let url = "https://bsarmah7.github.io/link-for-qr/view.html?data=" + encodeURIComponent(data);

    document.getElementById("link").value = url;
}

function copyLink() {
    let linkField = document.getElementById("link");

    if (!linkField.value) {
        alert("Generate link first");
        return;
    }

    linkField.select();
    document.execCommand("copy");

    alert("Link copied!");
}
</script>

</body>
</html>
